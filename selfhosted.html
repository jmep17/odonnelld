<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Daydream Believer</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Wrapper we scale to zoom into the singer's face. The origin points
       at the upper-center of the frame, where the face sits. */
    #zoom {
      position: absolute;
      inset: 0;
      transform-origin: 50% 34%;
      transform: scale(1);
      transition: transform 1000ms cubic-bezier(0.16, 0.84, 0.44, 1);
      will-change: transform;
    }

    #stage.zoomed #zoom {
      transform: scale(2.6);
    }

    /* Native player: object-fit:cover fills the screen with no bars
       and no ads, ever. */
    #player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 9%;
      transform: translateX(-50%);
      z-index: 5;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      font-size: clamp(16px, 4.5vw, 26px);
      letter-spacing: 0.02em;
      padding: 0.65em 1.2em;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      transition: opacity 600ms ease;
      text-align: center;
      user-select: none;
    }

    #hint.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="zoom">
      <!-- Drop a file named daydream.mp4 in the repo root and this plays
           it ad-free. Swap the src if you name the file differently. -->
      <video
        id="player"
        src="daydream.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
      ></video>
    </div>
    <div id="hint">tap anywhere</div>
  </div>

  <script>
    var stage = document.getElementById('stage');
    var hint = document.getElementById('hint');
    var video = document.getElementById('player');
    var soundOn = false;

    // Kick off muted autoplay for the "it's already playing" effect.
    var kickoff = video.play();
    if (kickoff && kickoff.catch) {
      kickoff.catch(function () { /* some browsers wait for the tap */ });
    }

    stage.addEventListener('click', function () {
      // First tap: turn the sound on (the gesture browsers require).
      if (!soundOn) {
        soundOn = true;
        hint.classList.add('hidden');
        video.muted = false;
        video.volume = 1;
        video.play();
      }

      // Every tap toggles the zoom into the singer's face.
      stage.classList.toggle('zoomed');
    });
  </script>
</body>
</html>
