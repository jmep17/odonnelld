<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Daydream Believer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }

    #stage {
      position: fixed; inset: 0; overflow: hidden; background: #000;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }

    /* Wrapper we scale to zoom into the singer's face. */
    #zoom {
      position: absolute; inset: 0;
      transform-origin: 50% 34%;
      transform: scale(1);
      transition: transform 900ms cubic-bezier(0.16, 0.84, 0.44, 1);
      will-change: transform;
    }

    /* Native player: object-fit cover fills the screen, no ads. */
    #player {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; background: #000; pointer-events: none;
    }

    .overlay {
      position: fixed; user-select: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #hint {
      left: 50%; bottom: 9%; transform: translateX(-50%); z-index: 6;
      pointer-events: none; color: #fff; font-size: clamp(16px, 4.5vw, 26px);
      padding: 0.65em 1.2em; background: rgba(0, 0, 0, 0.45);
      border-radius: 999px; backdrop-filter: blur(4px);
      transition: opacity 0.6s; text-align: center;
    }
    #hint.hidden { opacity: 0; }

    /* Rotating taunt captions. */
    #caption {
      left: 50%; top: 11%; transform: translateX(-50%) translateY(-10px);
      z-index: 5; pointer-events: none; color: #fff; font-weight: 800;
      font-size: clamp(22px, 6.5vw, 52px); text-align: center; max-width: 90vw;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.75);
      opacity: 0; transition: opacity 0.5s, transform 0.5s;
    }
    #caption.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Fake "Skip Ad" button. */
    #skip {
      right: 4%; bottom: 14%; z-index: 7; pointer-events: auto; cursor: pointer;
      color: #fff; font-size: clamp(13px, 3.6vw, 18px); font-weight: 600;
      padding: 0.6em 1em; background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.35); border-radius: 8px;
      backdrop-filter: blur(3px);
      transition: left 0.22s ease, top 0.22s ease, right 0.22s ease, bottom 0.22s ease, opacity 0.5s;
    }
    #skip.gone { opacity: 0; pointer-events: none; }

    /* Emoji burst particles. */
    .emoji {
      position: fixed; z-index: 8; pointer-events: none;
      will-change: transform, opacity; animation: burst 1s ease-out forwards;
    }
    @keyframes burst {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25) rotate(var(--rot)); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="zoom">
      <video id="player" src="daydream.mp4" autoplay muted loop playsinline preload="auto"></video>
    </div>
    <div id="caption" class="overlay"></div>
    <div id="skip" class="overlay">Skip Ad in 5</div>
    <div id="hint" class="overlay">tap anywhere</div>
  </div>

  <script>
    var stage   = document.getElementById('stage');
    var hint    = document.getElementById('hint');
    var caption = document.getElementById('caption');
    var skip    = document.getElementById('skip');
    var zoom    = document.getElementById('zoom');
    var video   = document.getElementById('player');

    var started = false;

    // Zoom cycle: normal -> face -> absurd nostril cam -> back around.
    var zoomLevels = [
      { s: 1,   oy: 34 },
      { s: 2.6, oy: 34 },
      { s: 5,   oy: 30 }
    ];
    var zi = 0;

    var emojis = ['❤️', '💕', '💜', '💖', '🎵', '🎶', '✨', '🌟', '🎸', '🐒'];
    var taunts = [
      "you've been Monkee'd 🐒",
      "cheer up, sleepy Jean",
      "tap again 😏",
      "there is no escape 😈",
      "Daydream Believer 🎶",
      "still no ads 😎"
    ];
    var ti = 0;

    // Kick off muted autoplay for the "it's already playing" effect.
    video.play().catch(function () {});

    // ---- Fake "Skip Ad" countdown ----
    var n = 5;
    var cd = setInterval(function () {
      n--;
      if (n > 0) { skip.textContent = 'Skip Ad in ' + n; }
      else { skip.textContent = 'Skip Ad ▶'; clearInterval(cd); }
    }, 1000);

    // Desktop: the button dodges the cursor before you've started.
    skip.addEventListener('mouseenter', function () {
      if (started) return;
      skip.style.right = 'auto';
      skip.style.bottom = 'auto';
      skip.style.left = (Math.random() * 68 + 12) + 'vw';
      skip.style.top  = (Math.random() * 68 + 12) + 'vh';
    });

    function requestFS() {
      var el = document.documentElement;
      var fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (fn) {
        try { var p = fn.call(el); if (p && p.catch) p.catch(function () {}); }
        catch (e) { /* not allowed / unsupported (e.g. iPhone Safari) */ }
      }
    }

    function revealSkip() {
      skip.textContent = 'lol — no ads here 😎';
      setTimeout(function () { skip.classList.add('gone'); }, 1500);
    }

    function nextTaunt() {
      caption.textContent = taunts[ti % taunts.length];
      ti++;
      caption.classList.add('show');
      setTimeout(function () { caption.classList.remove('show'); }, 2200);
    }

    function burst(x, y) {
      for (var i = 0; i < 11; i++) {
        var e = document.createElement('div');
        e.className = 'emoji';
        e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        var ang = Math.random() * Math.PI * 2;
        var dist = 60 + Math.random() * 150;
        e.style.left = x + 'px';
        e.style.top = y + 'px';
        e.style.setProperty('--dx', (Math.cos(ang) * dist) + 'px');
        e.style.setProperty('--dy', (Math.sin(ang) * dist - 45) + 'px'); // bias upward
        e.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
        e.style.fontSize = (22 + Math.random() * 24) + 'px';
        document.body.appendChild(e);
        (function (el) { setTimeout(function () { el.remove(); }, 1050); })(e);
      }
    }

    function applyZoom() {
      var z = zoomLevels[zi];
      zoom.style.transformOrigin = '50% ' + z.oy + '%';
      zoom.style.transform = 'scale(' + z.s + ')';
    }

    stage.addEventListener('click', function (ev) {
      var x = (ev.clientX != null) ? ev.clientX : window.innerWidth / 2;
      var y = (ev.clientY != null) ? ev.clientY : window.innerHeight / 2;

      if (!started) {
        // First tap: whole-screen takeover + sound + the show begins.
        started = true;
        requestFS();
        hint.classList.add('hidden');
        video.muted = false;
        video.volume = 1;
        video.play().catch(function () {});
        revealSkip();
        nextTaunt();
        setInterval(nextTaunt, 2800);
        zi = 1;              // jump straight to the face zoom
        applyZoom();
      } else {
        // Every later tap: cycle the zoom harder and taunt.
        zi = (zi + 1) % zoomLevels.length;
        applyZoom();
        nextTaunt();
      }

      burst(x, y);
    });
  </script>
</body>
</html>
