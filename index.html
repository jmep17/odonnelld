<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Link preview -->
  <title>Our Wedding Film</title>
  <meta property="og:title" content="Our Wedding Film 🎬" />
  <meta property="og:description" content="Aw, finally got the video back! ♡" />
  <meta property="og:image" content="https://jmep17.github.io/odonnelld/og-cover.png" />
  <meta property="og:type" content="video.other" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
      font-family: 'Roboto', system-ui, -apple-system, Segoe UI, sans-serif; }

    #stage { position: fixed; inset: 0; overflow: hidden; background: #000;
      cursor: pointer; -webkit-tap-highlight-color: transparent; }

    #player { position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; background: #000; pointer-events: none; z-index: 0; }

    /* Cloned videos spawned on every tap. */
    .clone { position: absolute; height: auto; border: 3px solid #fff;
      border-radius: 10px; box-shadow: 0 10px 34px rgba(0, 0, 0, 0.55);
      background: #000; pointer-events: none; }

    /* ---- Fake pre-roll "ad" UI (YouTube-style) ---- */
    #adbar { position: fixed; left: 0; bottom: 0; height: 4px; width: 0%;
      background: #ffca28; z-index: 40; transition: width 5s linear; }

    #adtag { position: fixed; left: 3.5vw; bottom: 8vh; z-index: 41;
      display: flex; align-items: center; gap: 8px;
      color: #fff; font-size: clamp(12px, 3.4vw, 15px); font-weight: 500;
      text-shadow: 0 1px 6px rgba(0,0,0,0.7); pointer-events: none; }
    #adtag b { background: #ffca28; color: #111; font-weight: 700;
      padding: 2px 6px; border-radius: 3px; font-size: 0.8em; letter-spacing: .3px; }

    #skip { position: fixed; right: 3.5vw; bottom: 8vh; z-index: 42;
      display: flex; align-items: center; gap: 10px;
      background: rgba(0, 0, 0, 0.72); color: #fff;
      font-size: clamp(13px, 3.7vw, 17px); font-weight: 500;
      padding: 0.7em 1.05em; border: 1px solid rgba(255,255,255,0.55);
      border-left-width: 0; border-radius: 2px;
      transition: left 0.2s ease, top 0.2s ease, right 0.2s ease, bottom 0.2s ease; }
    #skip.ready { cursor: pointer; background: rgba(0, 0, 0, 0.82); }
    #skip .chev { font-size: 1.15em; opacity: 0; }
    #skip.ready .chev { opacity: 1; }

    /* Emoji burst particles. */
    .emoji { position: fixed; z-index: 60; pointer-events: none;
      will-change: transform, opacity; animation: burst 1s ease-out forwards; }
    @keyframes burst {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25) rotate(var(--rot)); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <video id="player" src="daydream.mp4" autoplay muted loop playsinline preload="auto"></video>
  </div>

  <div id="adtag"><b>Ad</b><span>Your video will play after the ad</span></div>
  <div id="adbar"></div>
  <div id="skip"><span>Skip Ad in <span id="cd">5</span></span><span class="chev">▷|</span></div>

  <script>
    var stage  = document.getElementById('stage');
    var player = document.getElementById('player');
    var skip   = document.getElementById('skip');
    var cd     = document.getElementById('cd');
    var adtag  = document.getElementById('adtag');
    var adbar  = document.getElementById('adbar');

    var skipReady = false, started = false, clones = 0;
    var MAX_CLONES = 16;
    var emojis = ['❤️', '💕', '✨', '🎉', '💍', '🎶', '🌸'];

    // Muted "ad" autoplays immediately; countdown runs with no interaction.
    player.play().catch(function () {});
    requestAnimationFrame(function () { adbar.style.width = '100%'; });

    var n = 5;
    var timer = setInterval(function () {
      n--;
      if (n > 0) { cd.textContent = n; }
      else {
        clearInterval(timer);
        skipReady = true;
        skip.classList.add('ready');
        skip.querySelector('span').textContent = 'Skip Ad ';
      }
    }, 1000);

    function requestFS() {
      var el = document.documentElement;
      var fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (fn) { try { var p = fn.call(el); if (p && p.catch) p.catch(function () {}); } catch (e) {} }
    }

    function spawnClone() {
      if (clones >= MAX_CLONES) return;
      clones++;
      var v = document.createElement('video');
      v.src = 'daydream.mp4';
      v.muted = true; v.loop = true; v.autoplay = true;
      v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
      v.className = 'clone';
      var w = 34 + Math.random() * 30;
      v.style.width = w + 'vmin';
      v.style.left = (8 + Math.random() * 84) + 'vw';
      v.style.top  = (8 + Math.random() * 80) + 'vh';
      v.style.transform = 'translate(-50%, -50%) rotate(' + (Math.random() * 30 - 15) + 'deg)';
      v.style.zIndex = 10 + clones;
      stage.appendChild(v);
      try { v.currentTime = player.currentTime; } catch (e) {}
      v.play().catch(function () {});
    }

    function burst(x, y) {
      for (var i = 0; i < 7; i++) {
        var e = document.createElement('div');
        e.className = 'emoji';
        e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        var ang = Math.random() * Math.PI * 2, dist = 55 + Math.random() * 140;
        e.style.left = x + 'px'; e.style.top = y + 'px';
        e.style.setProperty('--dx', (Math.cos(ang) * dist) + 'px');
        e.style.setProperty('--dy', (Math.sin(ang) * dist - 40) + 'px');
        e.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
        e.style.fontSize = (22 + Math.random() * 22) + 'px';
        document.body.appendChild(e);
        (function (el) { setTimeout(function () { el.remove(); }, 1050); })(e);
      }
    }

    function dodgeSkip() {
      skip.style.right = 'auto'; skip.style.bottom = 'auto';
      skip.style.left = (Math.random() * 72 + 10) + 'vw';
      skip.style.top  = (Math.random() * 72 + 12) + 'vh';
    }

    // Reaching for "Skip Ad" is the trap: it clones instead of skipping.
    function detonate(x, y) {
      if (!skipReady) return;                 // must wait for the skip button
      if (!started) {
        started = true;
        player.muted = false; player.volume = 1; player.play().catch(function () {});
        requestFS();
        adtag.style.display = 'none';
        adbar.style.display = 'none';
      }
      spawnClone();
      burst(x, y);
      dodgeSkip();
    }

    skip.addEventListener('click', function (ev) {
      ev.stopPropagation();
      var r = skip.getBoundingClientRect();
      detonate(r.left + r.width / 2, r.top + r.height / 2);
    });
    stage.addEventListener('click', function (ev) {
      detonate(ev.clientX != null ? ev.clientX : window.innerWidth / 2,
               ev.clientY != null ? ev.clientY : window.innerHeight / 2);
    });
  </script>
</body>
</html>
