<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Link preview -->
  <title>Our Wedding Film</title>
  <meta property="og:title" content="Our Wedding Film 🎬" />
  <meta property="og:description" content="Aw, finally got the video back! ♡" />
  <meta property="og:image" content="https://jmep17.github.io/odonnelld/og-cover.png" />
  <meta property="og:type" content="video.other" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />

  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }

    #stage { position: fixed; inset: 0; overflow: hidden; background: #000;
      -webkit-tap-highlight-color: transparent; }

    /* The "wedding video" playing in the background. */
    #player { position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; background: #000; pointer-events: none; z-index: 0; }

    /* Ads layer. */
    #ads { position: fixed; inset: 0; z-index: 20; pointer-events: none; }

    .ad { position: absolute; pointer-events: auto; background: #111;
      border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 14px 44px rgba(0,0,0,0.6);
      transition: transform 0.18s ease; will-change: transform; }
    .adbar { display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(90deg, #4a3dd0, #7b3ff2); color: #fff;
      font-weight: 700; font-size: clamp(11px, 3vw, 14px);
      padding: 6px 6px 6px 11px; letter-spacing: 0.4px; }
    .adbar .lbl { display: flex; align-items: center; gap: 6px; }
    .adbar .lbl i { font-style: normal; background: rgba(255,255,255,0.85); color: #3a2ea8;
      border-radius: 3px; padding: 1px 5px; font-size: 0.82em; }
    .x { appearance: none; -webkit-appearance: none; border: 0; cursor: pointer;
      background: rgba(255,255,255,0.92); color: #222; font-weight: 800;
      width: 1.7em; height: 1.7em; border-radius: 5px; font-size: 1em; line-height: 1; }
    .admedia { display: block; width: 100%; height: auto; background: #000; pointer-events: none; }

    .emoji { position: fixed; z-index: 60; pointer-events: none;
      will-change: transform, opacity; animation: burst 1s ease-out forwards; }
    @keyframes burst {
      0%   { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.25) rotate(var(--rot)); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="stage">
    <video id="player" src="daydream.mp4" autoplay muted loop playsinline preload="auto"></video>
  </div>
  <div id="ads"></div>

  <script>
    var player = document.getElementById('player');
    var ads    = document.getElementById('ads');

    var started = false;
    var adCount = 0;         // live ads (for the cap)
    var zTop = 20;           // stacking counter
    var MAX_ADS = 12;        // keep phones happy
    var emojis = ['❤️', '💕', '✨', '🎉', '💍', '🎶', '🌸'];

    // Background "wedding video" autoplays muted immediately.
    player.play().catch(function () {});

    function requestFS() {
      var el = document.documentElement;
      var fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
      if (fn) { try { var p = fn.call(el); if (p && p.catch) p.catch(function () {}); } catch (e) {} }
    }

    function makeAd(first) {
      if (adCount >= MAX_ADS) return null;
      adCount++;
      var ad = document.createElement('div');
      ad.className = 'ad';
      var w = first ? 64 : (32 + Math.random() * 30);
      ad.style.width = w + 'vmin';
      ad.style.left = (first ? 50 : 12 + Math.random() * 76) + 'vw';
      ad.style.top  = (first ? 56 : 12 + Math.random() * 70) + 'vh';
      var rot = first ? 0 : (Math.random() * 20 - 10);
      ad.dataset.rot = rot;
      ad.dataset.scale = 1;
      ad.style.transform = 'translate(-50%, -50%) rotate(' + rot + 'deg)';
      ad.style.zIndex = ++zTop;
      ad.innerHTML = '<div class="adbar"><span class="lbl"><i>Ad</i>×</span>' +
                     '<button class="x" aria-label="Close">✕</button></div>';
      var v = document.createElement('video');
      v.src = 'daydream.mp4'; v.muted = true; v.loop = true; v.autoplay = true;
      v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
      v.className = 'admedia';
      ad.appendChild(v);
      ads.appendChild(ad);
      try { v.currentTime = player.currentTime; } catch (e) {}
      v.play().catch(function () {});
      return ad;
    }

    function burst(x, y) {
      for (var i = 0; i < 7; i++) {
        var e = document.createElement('div');
        e.className = 'emoji';
        e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        var ang = Math.random() * Math.PI * 2, dist = 55 + Math.random() * 140;
        e.style.left = x + 'px'; e.style.top = y + 'px';
        e.style.setProperty('--dx', (Math.cos(ang) * dist) + 'px');
        e.style.setProperty('--dy', (Math.sin(ang) * dist - 40) + 'px');
        e.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
        e.style.fontSize = (22 + Math.random() * 22) + 'px';
        document.body.appendChild(e);
        (function (el) { setTimeout(function () { el.remove(); }, 1050); })(e);
      }
    }

    // Trying to close an ad: it grows and breeds instead.
    function closeAttempt(ad, x, y) {
      if (!started) {
        started = true;
        player.muted = false; player.volume = 1; player.play().catch(function () {});
        requestFS();
      }
      var s = parseFloat(ad.dataset.scale || '1') * 1.28;
      ad.dataset.scale = s;
      ad.style.zIndex = ++zTop;
      ad.style.transform = 'translate(-50%, -50%) rotate(' + ad.dataset.rot + 'deg) scale(' + s + ')';
      makeAd(false);        // a fresh one pops up somewhere
      burst(x, y);
    }

    ads.addEventListener('click', function (ev) {
      var x = ev.target.closest && ev.target.closest('.x');
      if (!x) return;
      ev.stopPropagation();
      var ad = x.closest('.ad');
      var r = x.getBoundingClientRect();
      closeAttempt(ad, r.left + r.width / 2, r.top + r.height / 2);
    });

    // The first ad appears shortly after the "video" starts.
    setTimeout(function () { makeAd(true); }, 900);
  </script>
</body>
</html>
